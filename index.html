   <!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ridhoo Gaming</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
background:linear-gradient(135deg,#0f0f1b,#1a1a2e);
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
padding:40px;
border-radius:20px;
text-align:center;
box-shadow:0 0 40px rgba(0,255,255,0.2);
}

h1{
font-size:32px;
margin-bottom:10px;
}

p{
opacity:0.7;
margin-bottom:20px;
}

button{
padding:10px 20px;
border:none;
border-radius:30px;
background:cyan;
color:black;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:white;
}
</style>
</head>

<body>
<div class="card">
<h1>🔥 RIDHOO GAMING 🔥</h1>
<p>Mobile Legends Player | Indonesia</p>
<button>Follow Me</button>
</div>
</body>
</html>
